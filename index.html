<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Butang On/Off Lagu Kat Atas Kanan -->
  <button id="musicToggle" onclick="toggleMusic()">🎵 On/Off Lagu</button>

  <div class="card" id="card">
    <div class="heart-icon" id="icon">🧊</div>
    <h1 id="title">haiii 🧊</h1>
    <p id="message">Tekan button bawah ni dulu...</p>
    
    <button id="nextBtn" onclick="nextPage()">haii</button>

    <!-- Audio Player Rasmi yang Nampak & Comel (Supaya Browser Tak Block) -->
    <div style="margin-top: 20px;">
      <audio id="bgMusic" controls style="width: 100%; height: 35px; border-radius: 20px;">
        <source src="Sempurna.mp3" type="audio/mp3">
        Pelayar anda tidak menyokong audio.
      </audio>
    </div>
  </div>

  <script src="script.js?v=4"></script>
</body>
