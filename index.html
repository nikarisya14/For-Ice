<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You 💕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Button On/Off Muzik kat Atas Kanan -->
  <button id="musicToggle" onclick="toggleMusic()" style="position: fixed; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); border: 1px solid #ffb6c1; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; color: #d8698b; z-index: 999; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">🎵 On/Off Lagu</button>

  <div class="card" id="card">
    <div class="heart-icon" id="icon">🧊</div>
    <h1 id="title">haiii 🧊</h1>
    <p id="message">Tekan button bawah ni dulu...</p>
    
    <button id="nextBtn" onclick="nextPage()">haii</button>

    <!-- YouTube Audio Player tersembunyi (Lagu Sempurna) -->
    <div style="display:none;">
      <iframe id="ytAudio" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
